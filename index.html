<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="body">

    <div id="input-container">
        <h1>Weather Report</h1>

        <form id="form">
            <label for="city">City:</label>
            <input type="text" id="city" placeholder="enter city"><br>
            <button type="submit" id="submitBtn">Check weather condition</button>
        </form>

        <p id="error" class="error"></p>

        <div class="info" id="result">
            <div class="weather-headline">
                <img id="icon" class="weather-icon" alt="weather icon">
                <div>
                    <h1 class="info-title" id="name"></h1>
                    <p id="country" class="subtitle"></p>
                </div>
            </div>

            <p class="temp-big"><span id="temp"></span><span class="unit">°C</span></p>
            <p class="desc-text" id="desc"></p>

            <div class="grid">
                <div class="info-data"><span>Feels Like</span><span id="feelslike"></span></div>
                <div class="info-data"><span>Max Temp</span><span id="maxtemp"></span></div>
                <div class="info-data"><span>Min Temp</span><span id="mintemp"></span></div>
                <div class="info-data"><span>Humidity</span><span id="humidity"></span></div>
                <div class="info-data"><span>Pressure</span><span id="pressure"></span></div>
                <div class="info-data"><span>Wind Speed</span><span id="wind"></span></div>
                <div class="info-data"><span>Sunrise</span><span id="sunrise"></span></div>
                <div class="info-data"><span>Sunset</span><span id="sunset"></span></div>
                <div class="info-data"><span>Latitude</span><span id="lat"></span></div>
                <div class="info-data"><span>Longitude</span><span id="lon"></span></div>
                <div class="info-data"><span>Condition</span><span id="main"></span></div>
            </div>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
